<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>העיתון הדמוקרטי - בית</title>
  <style>
    #admin {
        display: none;
    }
    .topnav {
      background-color: #333;
      overflow: hidden;
      direction: rtl; /* Right to left direction */
    }
    .topnav a {
      float: right;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    .topnav span {
      float: right;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    iframe {
      flex-grow: 1; /* Ensures the iframe takes up the remaining height */
      width: 100%;
      border: none;
    }
  </style>
  <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body id="content" style="text-align: center; background-color: #0F4C81; scroll-behavior: smooth">
  <div id="nav-placeholder"></div>
  <iframe id="paperframe" src="/paper/paper.pdf#toolbar=0" width="100%"></iframe>
  <script>
    function setIframeHeight() {
      var iframe = document.getElementById('paperframe');
      iframe.style.height = (window.innerHeight - 50) + 'px';
    }
    window.onload = setIframeHeight;
    window.onresize = setIframeHeight;
  </script>
  <script>
    const cookieToElementMap = {
        'name': 'name'
    };
    const cookies = document.cookie.split(';');
    cookies.forEach(cookie => {
        const [name, value] = cookie.trim().split('=');
        if (cookieToElementMap[name]) {
            console.log(`${name.charAt(0).toUpperCase() + name.slice(1)}:`, value);
            const elementId = cookieToElementMap[name];
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = 'שלום, ' + value;
            }
            if (value == "admin") {
                document.write("<style>#admin {display: block;}</style>")
            }
        }
    });
  </script>
  <script>
    function deleteCookies() {
      event.preventDefault();
      document.cookie = "id=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      document.cookie = "name=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      document.cookie = "school=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      document.cookie = "rule=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      window.location.href = "/";
    }
  </script>
  <a style="color: white; position: fixed; left: 0; bottom: 0; opacity:0.5" href="mailto:pelegu09@hhds.org.il">לפניות, בעיות והצתרפות לצוות העיתון<br>pelegu09@hhds.org.il</a>
  <a id="admin" style="color: white; position: fixed; right: 0; bottom: 0; opacity:0.5" href="/admin">לניהול האתר</a>
  <script>
    $(function(){
      $("#nav-placeholder").load("/nav.html");
    });
  </script>
</body>
</html>
